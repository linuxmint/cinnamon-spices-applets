<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 22 22" width="22" height="22">
  <!-- Solar panel (red = importing from grid) -->
  <rect x="3" y="5" width="16" height="11" rx="1" ry="1" fill="#f44336" stroke="#d32f2f" stroke-width="1"/>
  <!-- Grid lines on panel -->
  <line x1="3" y1="8.5" x2="19" y2="8.5" stroke="#ef9a9a" stroke-width="0.5"/>
  <line x1="3" y1="12.5" x2="19" y2="12.5" stroke="#ef9a9a" stroke-width="0.5"/>
  <line x1="8" y1="5" x2="8" y2="16" stroke="#ef9a9a" stroke-width="0.5"/>
  <line x1="14" y1="5" x2="14" y2="16" stroke="#ef9a9a" stroke-width="0.5"/>
  <!-- Stand -->
  <line x1="11" y1="16" x2="11" y2="19" stroke="#d32f2f" stroke-width="1.5"/>
  <line x1="7" y1="19" x2="15" y2="19" stroke="#d32f2f" stroke-width="1.5" stroke-linecap="round"/>
  <!-- << arrows -->
  <polyline points="14,7 11,10.5 14,14" fill="none" stroke="#fff" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  <polyline points="10,7 7,10.5 10,14" fill="none" stroke="#fff" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
